<!DOCTYPE html>
<html>
<head>
    <title>Chess RPG 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            flex: 3;
            width: 100%;
            height: 100%;
            background: #000;
        }
        #hud {
            flex: 1;
            padding: 20px;
            background: #181818;
            border-left: 2px solid #333;
        }
        #log {
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            background: #101010;
            font-size: 14px;
        }
        #homescreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999999;
        }
        #homescreen input {
            padding: 10px;
            font-size: 20px;
            margin-bottom: 20px;
            width: 250px;
            text-align: center;
        }
        #homescreen button {
            padding: 10px 20px;
            font-size: 22px;
            cursor: pointer;
            background: #00ff88;
            border: none;
            border-radius: 5px;
        }
        #gameover {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="homescreen">
    <h1 style="font-size: 60px;">Chess RPG 3D</h1>
    <input id="playername" placeholder="Enter your name">
    <button id="playbutton">Play</button>
</div>

<div id="game-container"></div>

<div id="hud">
    <h1>Turn‑Based Chess RPG</h1>
    <div>HP: <span id="hp">20</span></div>
    <div>Attack: <span id="atk">5</span></div>
    <div>Wave: <span id="wave">1</span></div>
    <div>Shield Cooldown: <span id="scd">0</span></div>
    <div>Turn: <span id="turn">Player</span></div>
    <p>Controls: W/A/S/D move, O shoot, P block</p>
    <div id="log"></div>
</div>

<div id="gameover">
    <h1 style="font-size: 80px; margin: 0;">CHECKMATE</h1>
    <p style="font-size: 24px; opacity: 0.8;">You have been defeated.</p>
</div>

<script>
// ===== GAME LOGIC =====
const hpEl = document.getElementById("hp");
const atkEl = document.getElementById("atk");
const waveEl = document.getElementById("wave");
const scdEl = document.getElementById("scd");
const turnEl = document.getElementById("turn");
const logEl = document.getElementById("log");

let playerName = "Player";
let enemyName = "Enemy";

const BOARD_SIZE = 8;

let player = { x: 0, y: 7, hp: 20, atk: 5, shield: false, shieldCooldown: 0 };
let enemy = null;
let wave = 1;

let playerTurn = true;
let hasShotThisTurn = false;

function log(msg) {
    const p = document.createElement("p");
    p.textContent = msg;
    logEl.appendChild(p);
    logEl.scrollTop = logEl.scrollHeight;
}

function render() {
    hpEl.textContent = player.hp;
    atkEl.textContent = player.atk;
    waveEl.textContent = wave;
    scdEl.textContent = player.shieldCooldown;
    turnEl.textContent = playerTurn ? "Player" : "Enemy";

    if (window.player3D) {
        player3D.position.set(player.x, 0.2, player.y);
    }
    if (window.enemy3D) {
        if (enemy) {
            enemy3D.visible = true;
            enemy3D.position.set(enemy.x, 0.2, enemy.y);
        } else {
            enemy3D.visible = false;
        }
    }
}

document.getElementById("playbutton").addEventListener("click", () => {
    const nameInput = document.getElementById("playername").value.trim();
    if (nameInput.length > 0) playerName = nameInput;
    document.getElementById("homescreen").style.display = "none";
    spawnEnemy();
    render();
    log("Welcome, " + playerName + "! Your turn.");
});

function gameOver() {
    document.getElementById("gameover").style.display = "flex";
    playerTurn = false;
    document.body.style.pointerEvents = "none";
    log("GAME OVER");
}

function spawnEnemy() {
    wave++;
    waveEl.textContent = wave;

    const heal = Math.floor(player.hp * 0.1);
    player.hp += heal;
    log("You heal " + heal + " HP!");

    let ex, ey;
    do {
        ex = Math.floor(Math.random() * BOARD_SIZE);
        ey = Math.floor(Math.random() * BOARD_SIZE);
    } while (ex === player.x && ey === player.y);

    enemyName = "Enemy " + wave;

    enemy = {
        x: ex,
        y: ey,
        hp: 10 + wave * 2,
        atk: 3 + Math.floor(wave / 2)
    };

    log(enemyName + " appears!");
    render();
}

function findNextStep(sx, sy, tx, ty) {
    const dirs = [
        { dx: 1, dy: 0 },
        { dx: -1, dy: 0 },
        { dx: 0, dy: 1 },
        { dx: 0, dy: -1 }
    ];

    const visited = Array.from({ length: BOARD_SIZE }, () =>
        Array(BOARD_SIZE).fill(false)
    );
    const queue = [];
    const parent = {};

    function key(x, y) { return x + "," + y; }

    queue.push({ x: sx, y: sy });
    visited[sy][sx] = true;
    parent[key(sx, sy)] = null;

    while (queue.length > 0) {
        const c = queue.shift();
        if (c.x === tx && c.y === ty) break;

        for (const d of dirs) {
            const nx = c.x + d.dx;
            const ny = c.y + d.dy;

            if (
                nx >= 0 && nx < BOARD_SIZE &&
                ny >= 0 && ny < BOARD_SIZE &&
                !visited[ny][nx]
            ) {
                visited[ny][nx] = true;
                parent[key(nx, ny)] = c;
                queue.push({ x: nx, y: ny });
            }
        }
    }

    let step = { x: tx, y: ty };
    let prev = parent[key(tx, ty)];

    while (prev && !(prev.x === sx && prev.y === sy)) {
        step = prev;
        prev = parent[key(step.x, step.y)];
    }

    return step;
}

function endPlayerTurn() {
    playerTurn = false;
    hasShotThisTurn = false;
    document.body.style.pointerEvents = "none";
    render();
    setTimeout(enemyTurn, 600);
}

function enemyTurn() {
    if (!enemy || enemy.hp <= 0) {
        playerTurn = true;
        document.body.style.pointerEvents = "auto";
        render();
        return;
    }

    if (Math.abs(enemy.x - player.x) + Math.abs(enemy.y - player.y) === 1) {
        if (player.shield) {
            log(enemyName + " hits your shield!");
            player.shield = false;
            player.shieldCooldown = 3;
        } else {
            player.hp -= enemy.atk;
            log(enemyName + " hits you for " + enemy.atk);
            if (player.hp <= 0) {
                gameOver();
                return;
            }
        }
        playerTurn = true;
        document.body.style.pointerEvents = "auto";
        render();
        return;
    }

    const next = findNextStep(enemy.x, enemy.y, player.x, player.y);
    enemy.x = next.x;
    enemy.y = next.y;

    log(enemyName + " moves.");
    playerTurn = true;
    document.body.style.pointerEvents = "auto";
    render();
}

function movePlayer(dx, dy) {
    if (!playerTurn) return;

    const nx = player.x + dx;
    const ny = player.y + dy;

    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) {
        log("Can't move off board.");
        return;
    }

    player.x = nx;
    player.y = ny;

    if (player.shieldCooldown > 0) player.shieldCooldown--;

    log(playerName + " moves.");
    render();
    endPlayerTurn();
}

function block() {
    if (!playerTurn) return;

    if (player.shieldCooldown > 0) {
        log("Shield on cooldown!");
        return;
    }

    player.shield = true;
    log(playerName + " raises shield!");
    render();
}

function shoot() {
    if (!playerTurn) return;
    if (hasShotThisTurn) return;
    if (!enemy) return;

    const dx = enemy.x - player.x;
    const dy = enemy.y - player.y;

    if (dx !== 0 && dy !== 0) {
        log("Enemy not in line.");
        return;
    }

    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        log("Enemy too far.");
        return;
    }

    hasShotThisTurn = true;

    enemy.hp -= player.atk;
    log("You shoot " + enemyName + "! HP: " + enemy.hp);

    if (enemy.hp <= 0) {
        log(enemyName + " defeated!");
        enemy = null;
        spawnEnemy();
    }

    render();
    endPlayerTurn();
}

document.addEventListener("keydown", e => {
    if (!playerTurn) return;

    if (e.key === "w") movePlayer(0, -1);
    if (e.key === "s") movePlayer(0, 1);
    if (e.key === "a") movePlayer(-1, 0);
    if (e.key === "d") movePlayer(1, 0);

    if (e.key === "o") shoot();
    if (e.key === "p") block();
});

// ===== 3D SETUP =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    (window.innerWidth * 0.75) / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth * 0.75, window.innerHeight);
renderer.setClearColor(0x000000);
document.getElementById("game-container").appendChild(renderer.domElement);

camera.position.set(BOARD_SIZE / 2, BOARD_SIZE, BOARD_SIZE * 1.5);
camera.lookAt(BOARD_SIZE / 2, 0, BOARD_SIZE / 2);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20, 50, 20);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

const boardGroup = new THREE.Group();
for (let x = 0; x < BOARD_SIZE; x++) {
    for (let y = 0; y < BOARD_SIZE; y++) {
        const color = (x + y) % 2 === 0 ? 0xffffff : 0x444444;
        const tile = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.2, 1),
            new THREE.MeshPhongMaterial({ color })
        );
        tile.position.set(x, 0, y);
        boardGroup.add(tile);
    }
}
scene.add(boardGroup);

function createPawn(color) {
    const group = new THREE.Group();

    const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.6, 0.4, 16),
        new THREE.MeshPhongMaterial({ color })
    );
    group.add(base);

    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 0.8, 16),
        new THREE.MeshPhongMaterial({ color })
    );
    body.position.y = 0.6;
    group.add(body);

    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 16, 16),
        new THREE.MeshPhongMaterial({ color })
    );
    head.position.y = 1.2;
    group.add(head);

    return group;
}

window.player3D = createPawn(0xffffff);
scene.add(player3D);

window.enemy3D = createPawn(0x000000);
scene.add(enemy3D);

player3D.position.set(player.x, 0.2, player.y);
enemy3D.position.set(7, 0.2, 0);

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
